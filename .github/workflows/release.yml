name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

# Authenticate @vscode/ripgrep's postinstall against the GitHub API to
# avoid the 60 req/h anonymous rate limit shared across Actions runners.
# Same reasoning as pr-check.yml — see the note there.
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Copy README and LICENSE into packages
        run: |
          cp LICENSE packages/core/LICENSE
          cp LICENSE packages/cli/LICENSE
          cp README.md packages/cli/README.md
          cp README.en.md packages/cli/README.en.md

      - name: Publish to npm
        run: |
          cd packages/core && pnpm publish --provenance --access public --no-git-checks
          cd ../cli && pnpm publish --provenance --access public --no-git-checks

      - name: Extract latest changelog section
        run: awk '/^## v/{c++} c==1' CHANGELOG.md > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
